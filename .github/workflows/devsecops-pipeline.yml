name: DevSecOps Security Pipeline

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  security-events: write
  actions: read

jobs:

  snyk-scan:
    name: Snyk Dependency Scan
    runs-on: ubuntu-latest
    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Snyk Scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --sarif-file-output=snyk.sarif

      - name: Upload Snyk Results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: snyk.sarif
          category: snyk

  trivy-fs-scan:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest
    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          ignore-unfixed: true

      - name: Upload Trivy FS Results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

      - name: Trivy Dockerfile Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: 'docker/'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

  trivy-image-scan:
    name: Trivy Docker Image Scan
    runs-on: ubuntu-latest
    needs: trivy-fs-scan
    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build \
            -f docker/Dockerfile \
            -t devsecops-demo:${{ github.sha }} \
            .

      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'devsecops-demo:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-image.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          ignore-unfixed: true

      - name: Trivy Image Scan Table
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'devsecops-demo:${{ github.sha }}'
          format: 'table'
          severity: 'CRITICAL,HIGH,MEDIUM'
          ignore-unfixed: true

      - name: Upload Trivy Image Results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

  secret-scan:
    name: Secret Detection Scan
    runs-on: ubuntu-latest
    steps:

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Trivy Secret Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          scanners: 'secret'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH,MEDIUM,LOW'

  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    needs: [snyk-scan, trivy-fs-scan, trivy-image-scan, secret-scan]
    if: always()
    steps:

      - name: Evaluate Security Gate
        run: |
          echo "================================"
          echo "   DevSecOps Security Gate"
          echo "================================"
          echo "Snyk Scan:        ${{ needs.snyk-scan.result }}"
          echo "Trivy FS Scan:    ${{ needs.trivy-fs-scan.result }}"
          echo "Trivy Image Scan: ${{ needs.trivy-image-scan.result }}"
          echo "Secret Scan:      ${{ needs.secret-scan.result }}"
          echo "================================"

          if [ "${{ needs.secret-scan.result }}" == "failure" ]; then
            echo "BLOCKED: Secrets detected in codebase!"
            exit 1
          fi

          if [ "${{ needs.trivy-fs-scan.result }}" == "failure" ]; then
            echo "BLOCKED: Critical Dockerfile misconfiguration found!"
            exit 1
          fi

          echo "Security Gate PASSED — safe to merge!"
